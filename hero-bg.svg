<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" width="1920" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628" />
      <stop offset="40%" style="stop-color:#0f1d36" />
      <stop offset="100%" style="stop-color:#12203d" />
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#c9a96e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="goldLine2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#c9a96e;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glowCenter" cx="65%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#1a2d52;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowGold" cx="70%" cy="35%" r="25%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0" />
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1920" height="900" fill="url(#bgGrad)" />

  <!-- Subtle glow areas -->
  <rect width="1920" height="900" fill="url(#glowCenter)" />
  <rect width="1920" height="900" fill="url(#glowGold)" />

  <!-- Abstract geometric pattern - elegant thin lines -->
  <!-- Horizontal flowing lines -->
  <path d="M 0 200 Q 480 180, 960 220 Q 1440 260, 1920 200" fill="none" stroke="url(#goldLine)" stroke-width="0.5" />
  <path d="M 0 350 Q 480 320, 960 360 Q 1440 400, 1920 350" fill="none" stroke="url(#goldLine)" stroke-width="0.4" />
  <path d="M 0 500 Q 480 470, 960 510 Q 1440 550, 1920 500" fill="none" stroke="url(#goldLine)" stroke-width="0.3" />
  <path d="M 0 650 Q 480 620, 960 660 Q 1440 700, 1920 650" fill="none" stroke="url(#goldLine)" stroke-width="0.4" />

  <!-- Vertical subtle lines -->
  <line x1="400" y1="0" x2="400" y2="900" stroke="url(#goldLine2)" stroke-width="0.3" />
  <line x1="800" y1="0" x2="800" y2="900" stroke="url(#goldLine2)" stroke-width="0.3" />
  <line x1="1200" y1="0" x2="1200" y2="900" stroke="url(#goldLine2)" stroke-width="0.3" />
  <line x1="1600" y1="0" x2="1600" y2="900" stroke="url(#goldLine2)" stroke-width="0.3" />

  <!-- Elegant circles - abstract molecular/medical feel -->
  <circle cx="1400" cy="300" r="120" fill="none" stroke="#c9a96e" stroke-width="0.4" opacity="0.12" />
  <circle cx="1400" cy="300" r="80" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.08" />
  <circle cx="1400" cy="300" r="40" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.06" />
  <circle cx="1400" cy="300" r="3" fill="#c9a96e" opacity="0.15" />

  <circle cx="1600" cy="500" r="90" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.08" />
  <circle cx="1600" cy="500" r="50" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.06" />
  <circle cx="1600" cy="500" r="3" fill="#c9a96e" opacity="0.1" />

  <circle cx="1250" cy="550" r="60" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.06" />

  <!-- Connecting lines between circles -->
  <line x1="1400" y1="300" x2="1600" y2="500" stroke="#c9a96e" stroke-width="0.3" opacity="0.06" filter="url(#softBlur)" />
  <line x1="1400" y1="300" x2="1250" y2="550" stroke="#c9a96e" stroke-width="0.3" opacity="0.05" filter="url(#softBlur)" />

  <!-- Small diamond accents -->
  <g transform="translate(300, 150) rotate(45)" opacity="0.08">
    <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#c9a96e" stroke-width="0.5" />
  </g>
  <g transform="translate(1700, 200) rotate(45)" opacity="0.06">
    <rect x="-6" y="-6" width="12" height="12" fill="none" stroke="#c9a96e" stroke-width="0.5" />
  </g>
  <g transform="translate(200, 700) rotate(45)" opacity="0.05">
    <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#c9a96e" stroke-width="0.5" />
  </g>

  <!-- Subtle dot pattern on the right -->
  <g opacity="0.04" fill="#c9a96e">
    <circle cx="1500" cy="150" r="1.5" />
    <circle cx="1540" cy="150" r="1.5" />
    <circle cx="1580" cy="150" r="1.5" />
    <circle cx="1500" cy="190" r="1.5" />
    <circle cx="1540" cy="190" r="1.5" />
    <circle cx="1580" cy="190" r="1.5" />
    <circle cx="1500" cy="230" r="1.5" />
    <circle cx="1540" cy="230" r="1.5" />
    <circle cx="1580" cy="230" r="1.5" />
  </g>

  <!-- Bottom gradient fade for content transition -->
  <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="85%" style="stop-color:#0a1628;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0.8" />
  </linearGradient>
  <rect width="1920" height="900" fill="url(#bottomFade)" />
</svg>